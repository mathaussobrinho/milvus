# VisoHelp — colocar em /etc/nginx/sites-available/visohelp-dizparo
# Ativar: ln -sf /etc/nginx/sites-available/visohelp-dizparo /etc/nginx/sites-enabled/
# Depois: nginx -t && systemctl reload nginx
# SSL: certbot --nginx -d app.dizparo.com.br -d api.dizparo.com.br
#
# Ajuste as portas se WEB_HOST_PORT / API_HOST_PORT forem diferentes no .env.

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    listen [::]:80;
    server_name app.dizparo.com.br;

    client_max_body_size 25M;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        proxy_pass http://127.0.0.1:3010;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_cache_bypass $http_upgrade;
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name api.dizparo.com.br;

    client_max_body_size 25M;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        proxy_pass http://127.0.0.1:5212;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # CORS preflight (OPTIONS): reencaminhar cabecalhos do browser para a API
        proxy_set_header Access-Control-Request-Method $http_access_control_request_method;
        proxy_set_header Access-Control-Request-Headers $http_access_control_request_headers;
    }
}
